name: CodeQL

on:
  # Run on every PR that touches source files — skip pure docs/config changes
  # to avoid burning CI minutes on irrelevant commits.
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.mjs"
  push:
    branches: [master]
    paths:
      - "**/*.ts"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.mjs"
  schedule:
    - cron: "0 0 * * 0" # Sunday midnight UTC — weekly full scan on master

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read # read workflow run metadata
      contents: read # checkout
      security-events: write # upload SARIF results to GitHub Security tab
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended adds more security queries on top of the default set.
          # security-and-quality adds code quality rules (unused vars, dead code, etc.).
          queries: security-extended,security-and-quality
      # Autobuild detects the project type and compiles/bundles the code so
      # CodeQL can trace data flows across the full compiled output.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
