name: CodeQL

on:
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.mjs"
  push:
    branches: [master]
    paths:
      - "**/*.ts"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.mjs"
  schedule:
    - cron: "0 0 * * 0" # Sunday midnight UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
      - name: PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let count = 0;
            try {
              const { data } = await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
                state: 'open',
                tool_name: 'CodeQL',
                per_page: 100,
              });
              count = data.length;
            } catch (_) {}
            const icon = count === 0 ? '✅' : '⚠️';
            const summary = count === 0
              ? 'No alerts found.'
              : `${count} open alert(s) — [view in Security tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning).`;
            const marker = '<!-- codeql-report -->';
            const body = `${marker}\n### CodeQL ${icon} ${summary}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
