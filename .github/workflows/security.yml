name: Security

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "0 0 * * 1" # Monday midnight UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  audit:
    name: Yarn Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run audit
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Create issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Security: npm audit found high/critical vulnerabilities (${new Date().toISOString().slice(0, 10)})`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies'
            });
            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['security', 'dependencies'],
                body: 'Weekly `npm audit` found high or critical severity vulnerabilities. Run `npm audit` locally for details.'
              });
            }
