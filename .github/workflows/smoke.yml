name: Production Smoke Tests

on:
  deployment_status:

concurrency:
  group: smoke-production
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (Production)
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps
      - name: Run smoke tests
        id: smoke
        run: yarn test:smoke
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7
      - name: Notify failure on commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const deployUrl = context.payload.deployment_status.target_url;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: [
                '## 🚨 Production smoke tests failed',
                '',
                `**Deployment:** ${deployUrl}`,
                `**Details:** [view run](${runUrl})`,
                '',
                '**Manual rollback:** Vercel dashboard → Deployments → previous deployment → *Promote to Production*.',
              ].join('\n'),
            });
