name: Production Smoke Tests

# deployment_status fires every time a deployment changes state on GitHub.
# Vercel emits this event when it finishes deploying any environment
# (Preview or Production). The job condition below filters to Production only.
on:
  deployment_status:

# A fixed group name (not per-ref) ensures only one smoke run executes at a
# time for production. If a second deployment lands before the first smoke
# run finishes, the old run is cancelled and a fresh one starts immediately
# on the newer deployment.
concurrency:
  group: smoke-production
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (Production)
    # Two conditions must both be true:
    #   1. state == 'success'      — Vercel deployment completed without error
    #   2. environment == 'Production' — it's the production deployment, not a
    #      preview branch deploy. "Production" (capital P) is the exact string
    #      Vercel registers in GitHub for the production environment.
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    permissions:
      # createCommitComment requires contents:write.
      # No pull-requests permission needed — this event fires post-merge,
      # when there is no open PR to comment on.
      contents: write
    steps:
      # Check out the exact commit SHA that Vercel deployed, not necessarily
      # the current HEAD of master. This guarantees the Playwright tests we
      # run match the version of the code that is live in production.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      # Only Chromium is needed — smoke tests are a quick sanity check,
      # not a cross-browser compatibility suite.
      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps
      - name: Run smoke tests
        id: smoke
        run: yarn test:smoke
        env:
          # target_url is the immutable Vercel deployment URL, e.g.
          # https://myapp-abc123xyz.vercel.app. This URL is publicly accessible
          # on Vercel Hobby because it IS the production deployment, not a
          # protected preview. playwright.config.ts reads BASE_URL and uses it
          # as baseURL for the "smoke" project, skipping the local webServer.
          BASE_URL: ${{ github.event.deployment_status.target_url }}
      # Always upload the Playwright HTML report so failures can be diagnosed
      # visually even when the run itself has expired. Retention is shorter
      # than the E2E report (7 days vs 30) since smoke runs frequently.
      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

      # On smoke failure, post a comment directly on the deployed commit.
      # There is no open PR at this point (the code is already on master),
      # so a commit comment is the most visible place to surface the alert.
      # The comment includes the Vercel deployment URL and a direct link to
      # the failing run, plus manual rollback instructions (Vercel Hobby does
      # not support automated rollback via CLI — it must be done in the UI).
      - name: Notify failure on commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha       = context.payload.deployment.sha;
            const deployUrl = context.payload.deployment_status.target_url;
            const runUrl    = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: [
                '## 🚨 Production smoke tests failed',
                '',
                `**Deployment:** ${deployUrl}`,
                `**Details:** [view run](${runUrl})`,
                '',
                '**Manual rollback:** Vercel dashboard → Deployments → previous deployment → *Promote to Production*.',
              ].join('\n'),
            });
