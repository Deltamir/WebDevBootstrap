name: SBOM

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: write    # upload artifact + attach to release
      id-token: write    # Sigstore attestation (OIDC token)
      attestations: write
    steps:
      - uses: actions/checkout@v4

      # anchore/sbom-action uses Syft internally. Syft reads yarn.lock
      # directly from the filesystem — no yarn install or node_modules needed.
      # This avoids the DATABASE_URL/prisma-generate issue entirely.
      #
      # On push to master : generates sbom.cdx.json + uploads as workflow
      # artifact (sbom-cyclonedx, 90 days) + creates a Sigstore attestation.
      # On release        : also attaches sbom.cdx.json to the GitHub Release.
      - name: Generate and upload SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx
          # Only attach to the GitHub Release when the workflow was triggered
          # by a published release event; skip on plain push to master.
          upload-release-assets: ${{ github.event_name == 'release' }}
