name: E2E Tests

on:
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-padding-ok
      BETTER_AUTH_URL: http://localhost:3000
      YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - name: Install dependencies
        run: yarn install
      - name: Assert lockfile is up to date
        run: |
          if ! git diff --exit-code yarn.lock; then
            echo "::error::yarn.lock is out of date. Run 'yarn install' locally and commit the updated lockfile."
            exit 1
          fi
      - name: Push Prisma schema
        run: yarn prisma db push --accept-data-loss
      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps
      - name: Build app
        run: yarn build
      - name: Run Playwright tests
        run: yarn test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Test Results
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false
