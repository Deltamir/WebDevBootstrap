name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://localhost:5432/ci
  BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-padding-ok
  BETTER_AUTH_URL: http://localhost:3000
  # Yarn 4 enables --immutable automatically when CI=true (set by GitHub
  # Actions). Override so yarn install can migrate the lockfile format when
  # the Yarn version changes without failing the build.
  YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - name: Run lint
        id: lint
        run: yarn lint
      - name: PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lint-report
          message: "### Lint ${{ steps.lint.outcome == 'success' && '✅ Passed' || '❌ Failed — [view details](' }}${{ steps.lint.outcome != 'success' && github.server_url || '' }}${{ steps.lint.outcome != 'success' && '/' || '' }}${{ steps.lint.outcome != 'success' && github.repository || '' }}${{ steps.lint.outcome != 'success' && '/actions/runs/' || '' }}${{ steps.lint.outcome != 'success' && github.run_id || '' }}${{ steps.lint.outcome != 'success' && ')' || '' }}"

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - name: Run typecheck
        id: typecheck
        run: yarn typecheck
      - name: PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: typecheck-report
          message: "### TypeCheck ${{ steps.typecheck.outcome == 'success' && '✅ Passed' || '❌ Failed — [view details](' }}${{ steps.typecheck.outcome != 'success' && github.server_url || '' }}${{ steps.typecheck.outcome != 'success' && '/' || '' }}${{ steps.typecheck.outcome != 'success' && github.repository || '' }}${{ steps.typecheck.outcome != 'success' && '/actions/runs/' || '' }}${{ steps.typecheck.outcome != 'success' && github.run_id || '' }}${{ steps.typecheck.outcome != 'success' && ')' || '' }}"

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
      - name: Test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: coverage/junit.xml
          check_name: Unit Test Results
          action_fail: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-output
          path: .output/
          retention-days: 7
