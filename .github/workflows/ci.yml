name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://localhost:5432/ci
  BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-padding-ok
  BETTER_AUTH_URL: http://localhost:3000
  # Yarn 4 enables --immutable automatically when CI=true (set by GitHub
  # Actions). Override so yarn install can migrate the lockfile format when
  # the Yarn version changes without failing the build.
  YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - name: Run lint
        id: lint
        run: yarn lint
      - name: Run typecheck
        id: typecheck
        if: always()
        run: yarn typecheck
      - name: PR quality comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
        with:
          script: |
            const MARKER = '<!-- quality-combined -->';
            const DATA_RE = /<!--data:(\{.*?\})-->/s;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function fmt(outcome) {
              if (outcome === 'success') return '✅ Passed';
              if (outcome === 'failure') return `❌ Failed — [details](${runUrl})`;
              if (outcome === 'cancelled') return '🚫 Cancelled';
              return '⏭️ Skipped';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            const rawData = existing?.body?.match(DATA_RE)?.[1] ?? '{}';
            let data = {};
            try { data = JSON.parse(rawData); } catch (_) {}

            data.lint = fmt(process.env.LINT_OUTCOME);
            data.typecheck = fmt(process.env.TYPECHECK_OUTCOME);

            const codeqlVal = data.codeql ?? '⏳ Pending';

            const body = [
              MARKER,
              `<!--data:${JSON.stringify(data)}-->`,
              '### Code Quality',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| 🔍 Lint | ${data.lint} |`,
              `| 🔷 TypeCheck | ${data.typecheck} |`,
              `| 🛡️ CodeQL | ${codeqlVal} |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - name: Run tests
        id: tests
        run: yarn test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
      - name: Test report (check run)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: coverage/junit.xml
          check_name: Unit Test Results
          comment_mode: off
          action_fail: false
      - name: PR tests comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- tests-combined -->';
            const DATA_RE = /<!--data:(\{.*?\})-->/s;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function parseJunit(path) {
              try {
                const xml = fs.readFileSync(path, 'utf8');
                const tests    = +(xml.match(/\btests="(\d+)"/)?.[1]    ?? 0);
                const failures = +(xml.match(/\bfailures="(\d+)"/)?.[1] ?? 0);
                const errors   = +(xml.match(/\berrors="(\d+)"/)?.[1]   ?? 0);
                const skipped  = +(xml.match(/\bskipped="(\d+)"/)?.[1]  ?? 0);
                return { passed: tests - failures - errors - skipped, failed: failures + errors, skipped };
              } catch (_) { return null; }
            }

            function formatStats(stats, outcome) {
              if (outcome === 'cancelled') return '🚫 Cancelled';
              if (outcome === 'skipped')   return '⏭️ Skipped';
              if (!stats) return outcome === 'success' ? '✅ Passed' : `❌ Failed — [details](${runUrl})`;
              const parts = [];
              if (stats.passed > 0 || stats.failed === 0) parts.push(`✅ ${stats.passed} passed`);
              if (stats.failed  > 0) parts.push(`❌ ${stats.failed} failed`);
              if (stats.skipped > 0) parts.push(`⏭️ ${stats.skipped} skipped`);
              const text = parts.join(' · ') || '✅ 0 tests';
              return stats.failed > 0 ? `${text} — [details](${runUrl})` : text;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            const rawData = existing?.body?.match(DATA_RE)?.[1] ?? '{}';
            let data = {};
            try { data = JSON.parse(rawData); } catch (_) {}

            const stats = parseJunit('coverage/junit.xml');
            data.unit = formatStats(stats, process.env.TESTS_OUTCOME);

            const e2eVal = data.e2e ?? '⏳ Pending';

            const body = [
              MARKER,
              `<!--data:${JSON.stringify(data)}-->`,
              '### Tests',
              '',
              '| Suite | Résultats |',
              '|-------|-----------|',
              `| 🧪 Unit | ${data.unit} |`,
              `| 🎭 E2E Playwright | ${e2eVal} |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-output
          path: .output/
          retention-days: 7
