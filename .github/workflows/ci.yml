name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# DATABASE_URL is required by `prisma generate` (Prisma 7 validates it even
# for codegen, not just for DB connections). A placeholder URL is sufficient
# for all jobs that don't need an actual database.
env:
  DATABASE_URL: postgresql://localhost:5432/ci
  BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-padding-ok
  BETTER_AUTH_URL: http://localhost:3000
  # Yarn 4 auto-enables --immutable when CI=true (injected by GitHub Actions).
  # We disable it here and enforce lockfile integrity via the sync-lockfile job.
  YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

jobs:
  # Runs yarn install and pushes an updated yarn.lock if the format changed
  # (e.g. after a Yarn version bump). Only runs for branches in this repo
  # (not forks) so it has push access. All other jobs depend on this one
  # to ensure they start with a consistent lockfile.
  sync-lockfile:
    name: Sync yarn.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip on forks: they don't have push permission
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      updated: ${{ steps.check.outputs.updated }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the branch ref so the push lands on the right branch
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - name: Install dependencies
        run: yarn install
      - name: Push updated lockfile if format changed
        id: check
        run: |
          if git diff --exit-code yarn.lock; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add yarn.lock
            git commit -m "chore: update yarn.lock format [skip ci]"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    needs: sync-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn lint

  typecheck:
    name: TypeCheck
    needs: sync-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn typecheck

  unit:
    name: Unit Tests
    needs: sync-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: coverage/junit.xml
          reporter: jest-junit
          fail-on-error: false

  build:
    name: Build
    needs: sync-lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn install
      - run: yarn build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-output
          path: .output/
          retention-days: 7
