version: 2
updates:
  # NPM/Yarn dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: /
    reviewers:
      - Deltamir
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "@types/**"
          - "eslint*"
          - "vitest"
          - "playwright"
          - "@nuxt/test-utils"
          - "@vitest/**"
      prisma:
        patterns:
          - "@prisma/**"
          - "prisma"
      actions:
        dependency-type: production

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "03:00"
    commit-message:
      prefix: "ci(actions)"
      include: scope
    open-pull-requests-limit: 10
